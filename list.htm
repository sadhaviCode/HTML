<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>list</title>
</head>
<body>
    <ol>
        <li>dairy milk</li>
        <li>kit kat</li>
        <li>perk</li>
        <li>5 star</li>
    </ol>
    <ol type="A">
        <li>dairy milk 1</li>
        <li>kit kat 2</li>
        <li>perk 3</li>
        <li>5 star 4</li>
    </ol>
    <ol type="i">
        <li>dairy milk 1</li>
        <li>kit kat 2</li>
        <li>perk 3</li>
        <li>5 star 4</li>
    </ol>
    
</body>
</html>
