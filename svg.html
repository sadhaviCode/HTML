<!DOCTYPE html>
<html>
<head>
    <title>Doraemon SVG</title>
</head>
<body>

<svg width="400" height="500" viewBox="0 0 400 500">

    <!-- Head -->
    <circle cx="200" cy="180" r="120" fill="#00AEEF" stroke="black" stroke-width="3"/>

    <!-- Face -->
    <circle cx="200" cy="210" r="95" fill="white" stroke="black" stroke-width="2"/>

    <!-- Eyes -->
    <ellipse cx="175" cy="130" rx="28" ry="38" fill="white" stroke="black"/>
    <ellipse cx="225" cy="130" rx="28" ry="38" fill="white" stroke="black"/>

    <!-- Pupils -->
    <circle cx="185" cy="145" r="6" fill="black"/>
    <circle cx="215" cy="145" r="6" fill="black"/>

    <!-- Nose -->
    <circle cx="200" cy="175" r="15" fill="red" stroke="black"/>
    <circle cx="195" cy="170" r="4" fill="white"/>

    <!-- Nose Line -->
    <line x1="200" y1="190" x2="200" y2="250"
          stroke="black" stroke-width="2"/>

    <!-- Mouth -->
    <path d="M130 220 Q200 310 270 220"
          fill="none"
          stroke="black"
          stroke-width="3"/>

    <!-- Whiskers -->
    <line x1="90" y1="190" x2="170" y2="200"
          stroke="black" stroke-width="2"/>
    <line x1="90" y1="220" x2="170" y2="220"
          stroke="black" stroke-width="2"/>
    <line x1="90" y1="250" x2="170" y2="240"
          stroke="black" stroke-width="2"/>

    <line x1="230" y1="200" x2="310" y2="190"
          stroke="black" stroke-width="2"/>
    <line x1="230" y1="220" x2="310" y2="220"
          stroke="black" stroke-width="2"/>
    <line x1="230" y1="240" x2="310" y2="250"
          stroke="black" stroke-width="2"/>

    <!-- Body -->
    <ellipse cx="200" cy="370" rx="90" ry="100"
             fill="#00AEEF"
             stroke="black"
             stroke-width="3"/>

    <!-- Belly -->
    <ellipse cx="200" cy="390" rx="65" ry="75"
             fill="white"
             stroke="black"/>

    <!-- Collar -->
    <rect x="120" y="275" width="160" height="20"
          fill="red" stroke="black"/>

    <!-- Bell -->
    <circle cx="200" cy="305" r="18"
            fill="gold"
            stroke="black"/>
    <line x1="188" y1="305" x2="212" y2="305"
          stroke="black"/>
    <circle cx="200" cy="313" r="4" fill="black"/>

</svg>

</body>
</html>
